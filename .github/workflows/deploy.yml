    - name: Check Commit Message
      id: check_commit
      run: |
        # 检查提交消息是否以 "release:" 开头
        if [[ "${{ github.event.head_commit.message }}" == release:* ]]; then
          echo "::set-output name=is_release::true"
        else
          echo "::set-output name=is_release::false"
        fi

    - name: Setup Node.js
      if: steps.check_commit.outputs.is_release == 'true'
      uses: actions/setup-node@v4
name: Deploy Dumi Docs

on:
  push:
    branches: [ "master" ]  # 监听 main 或 master 分支的推送

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 关键：授予写入权限
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'  # 推荐使用 LTS 版本

    - name: Install Dependencies
      if: steps.check_commit.outputs.is_release == 'true'

    - name: Build Project
      if: steps.check_commit.outputs.is_release == 'true'

    - name: Deploy to GitHub Pages
      if: steps.check_commit.outputs.is_release == 'true'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}  # 自动使用内置 token
        publish_dir: ./docs-dist  # 必须与 outputPath 一致
        keep_files: false         # 是否保留历史文件（首次部署建议 false）
        force_orphan: true        # 强制清理旧文件